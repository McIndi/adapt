<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Adapt Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Adapt</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <ul class="navbar-nav">
                {% if ui_links %}
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="uiDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        UI
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="uiDropdown">
                        {% for link in ui_links %}
                        <li><a class="dropdown-item" href="{{ link.url }}">{{ link.name }}</a></li>
                        {% endfor %}
                    </ul>
                </li>
                {% endif %}
                {% if is_superuser %}
                <li class="nav-item">
                    <a class="nav-link" href="/admin/">Admin</a>
                </li>
                {% endif %}
            </ul>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/docs">Docs</a>
                    </li>
                </ul>
            </div>
            <form class="d-flex" method="post" action="/auth/logout">
                <button class="btn btn-outline-light" type="submit">Logout</button>
            </form>
        </div>
    </nav>
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dropdowns = document.querySelectorAll('.dropdown');
            dropdowns.forEach(dropdown => {
                const toggle = dropdown.querySelector('.dropdown-toggle');
                const menu = dropdown.querySelector('.dropdown-menu');
                if (toggle && menu) {
                    dropdown.addEventListener('mouseenter', () => {
                        menu.classList.add('show');
                        toggle.setAttribute('aria-expanded', 'true');
                    });
                    dropdown.addEventListener('mouseleave', () => {
                        menu.classList.remove('show');
                        toggle.setAttribute('aria-expanded', 'false');
                    });
                }
            });
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
