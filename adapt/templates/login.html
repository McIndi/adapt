<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Adapt</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 360px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #0f172a;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #64748b;
        }

        input {
            width: 100%;
            padding: 0.625rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.625rem;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: #2563eb;
        }

        .error {
            color: #ef4444;
            font-size: 0.875rem;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h1>Sign In</h1>
        <form id="login-form">
            <input type="hidden" id="csrf_token" name="csrf_token" value="{{ request.state.csrf_token if request and request.state else '' }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Login</button>
            <div id="error-msg" class="error">Invalid credentials</div>
        </form>
    </div>
    <script>
        function getCookie(name) {
            const cookies = document.cookie ? document.cookie.split('; ') : [];
            for (const entry of cookies) {
                const [cookieName, ...rest] = entry.split('=');
                if (cookieName === name) {
                    return decodeURIComponent(rest.join('='));
                }
            }
            return '';
        }

        function sanitizeNextPath(next) {
            if (!next || typeof next !== 'string') {
                return '/';
            }
            const trimmed = decodeURIComponent(next).trim();
            if (!trimmed.startsWith('/')) {
                return '/';
            }
            if (trimmed.startsWith('//')) {
                return '/';
            }
            return trimmed;
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const csrfToken = getCookie('adapt_csrf') || formData.get('csrf_token') || '';

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: csrfToken ? { 'X-CSRF-Token': csrfToken } : {},
                    body: formData
                });

                if (res.ok) {
                    // Check for redirect param
                    const params = new URLSearchParams(window.location.search);
                    const next = sanitizeNextPath(params.get('next'));
                    window.location.href = next;
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('error-msg').textContent = 'Connection error';
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>

</html>
